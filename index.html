<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ZapFácil</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background-color: #f1f5f9; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background-color: #ffffff; border: 1px solid #e2e8f0; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .logo-login { max-width: 220px; margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { font-size: 11px; font-weight: 800; color: #475569; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-field { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; background: #f8fafc; font-size: 14px; color: #1e293b; }
        .btn-login { width: 100%; padding: 14px; background-color: #059669; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .btn-login:hover { background-color: #047857; }
        h3 { color: #1e293b; margin-bottom: 25px; font-size: 18px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <!-- COLOQUE O NOME DO ARQUIVO DA LOGO ABAIXO -->
        <img src="NOME_DA_LOGO.png" alt="Logo" class="logo-login">
        
        <h3 id="tituloAcesso">Carregando...</h3>
        
        <div id="divChave" class="form-group hidden">
            <label>Chave de Ativação</label>
            <input type="text" id="inputChave" class="input-field" placeholder="Insira sua chave...">
        </div>

        <div class="form-group">
            <label id="labelSenha">Senha de Acesso</label>
            <input type="password" id="inputSenha" class="input-field" placeholder="Sua senha...">
        </div>

        <button class="btn-login" onclick="processarAcesso()">CONFIRMAR</button>
    </div>

    <script>
        // MUDAR AQUI: use 'zap_lite' para o Lite e 'zap_pro' para o Pro
        const ID_SISTEMA = 'zap_lite'; 

        function verificarEstado() {
            if (localStorage.getItem(ID_SISTEMA + '_configurado')) {
                document.getElementById('tituloAcesso').innerText = "Bem-vindo de volta!";
                document.getElementById('labelSenha').innerText = "Digite sua senha";
            } else {
                document.getElementById('tituloAcesso').innerText = "Primeira Ativação";
                document.getElementById('divChave').classList.remove('hidden');
            }
        }

        function processarAcesso() {
            const senha = document.getElementById('inputSenha').value;
            const chave = document.getElementById('inputChave').value;

            if (localStorage.getItem(ID_SISTEMA + '_configurado')) {
                if (senha === localStorage.getItem(ID_SISTEMA + '_senha')) {
                    window.location.href = "index.html"; 
                } else {
                    alert("Senha incorreta.");
                }
            } else {
                if (chave && senha) {
                    localStorage.setItem(ID_SISTEMA + '_configurado', 'true');
                    localStorage.setItem(ID_SISTEMA + '_senha', senha);
                    window.location.href = "index.html";
                } else {
                    alert("Preencha todos os campos.");
                }
            }
        }
        verificarEstado();
    </script>
</body>
</html>
